<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Набронировал</title>
    <style>
        /* ---------- ОСНОВНАЯ СЕТКА ---------- */
        .hotels-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);   /* 2 колонки */
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ---------- КАРТОЧКА ОТЕЛЯ ---------- */
        .hotel-card {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);   /* полупрозрачная подложка */
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        /* ---------- ИЗОБРАЖЕНИЕ ---------- */
        .hotel-card img {
            width: 320px;
            height: 200px;
            object-fit: cover;
            flex-shrink: 0;
            border-radius: 8px;
        }

        /* ---------- ТЕКСТОВЫЙ БЛОК ---------- */
        .hotel-info {
            margin-left: 20px;
            min-width: 0;                /* разрешает перенос строк */
        }

        .hotel-info h1 {
            margin: 0 0 5px 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            font-size: 1.3rem;
        }

        .hotel-info h2 {
            margin: 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            color: #555;
            font-size: 0.95rem;
        }

        /* ---------- МОБИЛЬНАЯ ВЕРСИЯ ---------- */
        @media (max-width: 768px) {
            .hotels-container {
                grid-template-columns: 1fr;          /* одна колонка */
            }
            .hotel-card {
                flex-direction: column;             /* картинка сверху, текст снизу */
                text-align: center;
            }
            .hotel-card img {
                width: 100%;
                max-width: 400px;
                height: auto;
            }
            .hotel-info {
                margin-left: 0;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body style="background-image: url('/static/images/123.webp');
             background-size: 100% auto;
             background-repeat: repeat-y;
             background-position: top center;">

    <div class="hotels-container">
        {% for hotel in hotels %}
        <div class="hotel-card">
            <img src="{{ url_for('static', path='images/' + hotel.image_id|string + '.webp') }}"
                 alt="Фото нет">
            <div class="hotel-info">
                <h1>{{ hotel.name }}</h1>
                <h2>{{ hotel.location }}</h2>
            </div>
        </div>
        {% endfor %}
    </div>

</body>
</html>
